name: LLM YouTube Tracker Bot

on:
  schedule:
    - cron: '0 */6 * * *' # Runs automatically every 6 hours
  workflow_dispatch: 
jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Crucial: Allows the bot to commit data back to your repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install System Dependencies (For Whisper Audio Chunking)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 1. NEW STEP: Securely write the cookies secret to a temporary file
      - name: Create YouTube Cookies File
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          echo "$YOUTUBE_COOKIES" > cookies.txt

      - name: Run Tracker Pipeline
        env:
          # Pulls your secure API keys from GitHub Secrets
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          
          # 2. NEW ENV VAR: Tells your python code/yt-dlp where the generated cookies file lives
          YOUTUBE_COOKIES_FILE: cookies.txt
        run: |
          python main.py init-db
          python main.py ingest --max-videos 10
          python main.py transcript --limit 20
          python main.py analyse --limit 20
          python main.py export-dashboard --output docs/data/latest.json
          
          # 3. Clean up the cookies file (optional, but good security practice)
          rm cookies.txt

      - name: Commit and Push Updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Force add tracker.db so it acts as the bot's "memory" between runs
          git add -f tracker.db
          git add docs/data/latest.json
          
          # Only commit if new videos/data were actually found
          if git diff --staged --quiet; then
            echo "No new data to commit."
          else
            git commit -m "Auto-update tracker data"
            git push
          fi