name: LLM YouTube Landscape Tracker

"on":
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Initialize database
        run: python main.py init-db

      - name: Ingest YouTube channels
        run: python main.py ingest
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}

      - name: Fetch transcripts
        run: python main.py transcript --limit 50
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Analyze transcripts
        run: python main.py analyse --limit 50
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Export dashboard snapshot
        run: python main.py export-dashboard

      - name: Commit refreshed artifacts
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tracker.db docs/data/latest.json
          if git diff --cached --quiet; then
            echo "No tracker artifacts changed."
          else
            git commit -m "Refresh tracker data"
            git push
          fi
